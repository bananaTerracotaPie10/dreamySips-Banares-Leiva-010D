spring.application.name=service-pedidos
server.port=8085

# Base de datos (ajusta según tu configuración)
spring.datasource.url=jdbc:mysql://localhost:3306/db_pedidos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# URLs de otros microservicios
services.cliente.url=http://localhost:8082
services.catalogo.url=http://localhost:8083
