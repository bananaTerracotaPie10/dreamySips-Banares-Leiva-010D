spring.application.name=service_pago
server.port=8090

# Base de datos (ajusta según tu configuración)
spring.datasource.url=jdbc:mysql://localhost:3306/db_pagos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs de otros microservicios
services.pedidos.url=http://localhost:8084
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
