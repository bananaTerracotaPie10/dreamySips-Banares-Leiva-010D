spring.application.name=service_resenas
server.port=8086

# Base de datos (ajusta según tu configuración)
spring.datasource.url=jdbc:mysql://localhost:3306/db_resenas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs de otros microservicios
services.clientes.url=http://localhost:8082
services.catalogo.url=http://localhost:8083
services.pedidos.url=http://localhost:8084

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html