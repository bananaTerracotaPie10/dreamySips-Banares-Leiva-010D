server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:8081"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

      server:
        webflux:
          routes:

            # CLIENTES
            - id: cliente-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/clientes/**

            # CATÁLOGO
            - id: catalogo-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/productos/**

            # DISEÑOS PERSONALIZADOS
            - id: diseno-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/disenos/**

            # PEDIDOS
            - id: pedidos-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/pedidos/**

            # RESEÑAS
            - id: resenas-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/v1/resenas/**

            # LISTA DE DESEOS
            - id: lista-deseos-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/v1/listadeseos/**

            # NOTIFICACIONES
            - id: notificaciones-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/v1/notificaciones/**

            # DOCUMENTACIÓN CLIENTES
            - id: cliente-docs
              uri: http://localhost:8082
              predicates:
                - Path=/docs-clientes/**
              filters:
                - RewritePath=/docs-clientes/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN CATÁLOGO
            - id: catalogo-docs
              uri: http://localhost:8083
              predicates:
                - Path=/docs-catalogo/**
              filters:
                - RewritePath=/docs-catalogo/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN DISEÑOS
            - id: diseno-docs
              uri: http://localhost:8084
              predicates:
                - Path=/docs-disenos/**
              filters:
                - RewritePath=/docs-disenos/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN PEDIDOS
            - id: pedidos-docs
              uri: http://localhost:8085
              predicates:
                - Path=/docs-pedidos/**
              filters:
                - RewritePath=/docs-pedidos/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN RESEÑAS
            - id: resenas-docs
              uri: http://localhost:8086
              predicates:
                - Path=/docs-resenas/**
              filters:
                - RewritePath=/docs-resenas/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN LISTA DE DESEOS
            - id: lista-deseos-docs
              uri: http://localhost:8087
              predicates:
                - Path=/docs-listadeseos/**
              filters:
                - RewritePath=/docs-listadeseos/(?<segment>.*), /v3/api-docs

            # DOCUMENTACIÓN NOTIFICACIONES
            - id: notificaciones-docs
              uri: http://localhost:8088
              predicates:
                - Path=/docs-notificaciones/**
              filters:
                - RewritePath=/docs-notificaciones/(?<segment>.*), /v3/api-docs

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

springdoc:
  swagger-ui:
    urls:
      - name: "Clientes API"
        url: /docs-clientes/v3/api-docs

      - name: "Catálogo API"
        url: /docs-catalogo/v3/api-docs

      - name: "Diseños API"
        url: /docs-disenos/v3/api-docs

      - name: "Pedidos API"
        url: /docs-pedidos/v3/api-docs

      - name: "Reseñas API"
        url: /docs-resenas/v3/api-docs

      - name: "Lista de Deseos API"
        url: /docs-listadeseos/v3/api-docs

      - name: "Notificaciones API"
        url: /docs-notificaciones/v3/api-docs